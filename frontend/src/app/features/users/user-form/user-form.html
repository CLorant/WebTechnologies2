<div class="form-container">
  <mat-card class="form-card">
    <mat-card-title>{{ isEditMode ? 'Felhasználó szerkesztése' : 'Új felhasználó' }}</mat-card-title>
    <form [formGroup]="userForm" (ngSubmit)="onSubmit()">
      <mat-form-field appearance="outline">
        <mat-label>Név</mat-label>
        <input matInput formControlName="name">
        <mat-error *ngIf="userForm.get('name')?.hasError('required')">Név kötelező</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Email</mat-label>
        <input matInput formControlName="email">
        <mat-error *ngIf="userForm.get('email')?.hasError('required')">Email kötelező</mat-error>
        <mat-error *ngIf="userForm.get('email')?.hasError('email')">Érvényes email cím szükséges</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Telefon</mat-label>
        <input matInput formControlName="phone">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Jelszó</mat-label>
        <input matInput formControlName="password" type="password">
        <mat-error *ngIf="userForm.get('password')?.hasError('required') && !isEditMode">Jelszó kötelező</mat-error>
        <mat-error *ngIf="userForm.get('password')?.hasError('minlength')">Legalább 6 karakter</mat-error>
      </mat-form-field>

      <div class="form-actions">
        <button mat-raised-button color="primary" type="submit" [disabled]="userForm.invalid">Mentés</button>
        <button mat-button type="button" routerLink="/user-list">Mégse</button>
      </div>
    </form>
  </mat-card>
</div>
