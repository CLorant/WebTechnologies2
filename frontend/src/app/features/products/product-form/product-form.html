<div class="form-container">
  <mat-card class="form-card">
    <mat-card-title>{{ isEditMode ? 'Termék szerkesztése' : 'Új termék' }}</mat-card-title>
    <form [formGroup]="productForm" (ngSubmit)="onSubmit()">
      <app-image-upload 
        [existingImageUrl]="productForm.get('img')?.value"
        (imageSelected)="onImageSelected($event)">
      </app-image-upload>
      
      <mat-form-field appearance="outline">
        <mat-label>Név</mat-label>
        <input matInput formControlName="name">
        <mat-error *ngIf="productForm.get('name')?.hasError('required')">Név kötelező</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Kategória</mat-label>
        <mat-select formControlName="category">
          <mat-option *ngFor="let cat of categories" [value]="cat._id">{{cat.name}}</mat-option>
        </mat-select>
        <mat-error *ngIf="productForm.get('category')?.hasError('required')">Kategória kötelező</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Ár (Ft)</mat-label>
        <input matInput type="number" formControlName="price">
        <mat-error *ngIf="productForm.get('price')?.hasError('required')">Ár kötelező</mat-error>
        <mat-error *ngIf="productForm.get('price')?.hasError('min')">Nem lehet negatív</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Leírás</mat-label>
        <textarea matInput formControlName="description" rows="3"></textarea>
        <mat-error *ngIf="productForm.get('description')?.hasError('required')">Leírás kötelező</mat-error>
      </mat-form-field>

      <div class="form-actions">
        <button mat-raised-button color="primary" type="submit" [disabled]="productForm.invalid">Mentés</button>
        <button mat-button type="button" routerLink="/product-list">Mégse</button>
      </div>
    </form>
  </mat-card>
</div>
