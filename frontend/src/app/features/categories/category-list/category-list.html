<div class="list-header">
  <h2>Termékkategóriák</h2>
  <button mat-raised-button color="primary" routerLink="/category/create">Új kategória</button>
</div>

<table mat-table [dataSource]="categories" class="mat-elevation-z2">
    <ng-container matColumnDef="icon">
        <th mat-header-cell *matHeaderCellDef> Ikon </th>
        <td mat-cell *matCellDef="let cat">
        <img [src]="cat.icon" width="32" height="32" *ngIf="cat.icon">
        </td>
    </ng-container>
    <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef> Név </th>
    <td mat-cell *matCellDef="let cat"> {{cat.name}} </td>
  </ng-container>
  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef> Műveletek </th>
    <td mat-cell *matCellDef="let cat">
      <button mat-icon-button color="primary" [routerLink]="['/category/edit', cat._id]">
        <mat-icon>edit</mat-icon>
      </button>
      <button mat-icon-button color="warn" (click)="deleteCategory(cat)">
        <mat-icon>delete</mat-icon>
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>
