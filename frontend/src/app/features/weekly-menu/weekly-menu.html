<div class="list-header">
  <h2>Heti menü szerkesztése</h2>
</div>

<mat-card>
  <mat-card-content>
    <form [formGroup]="menuForm">
      <div formArrayName="days">
        <div *ngFor="let day of daysArray.controls; let i = index" class="day-card">
          <h3>{{ days[i] }}</h3>
          <div [formGroupName]="i" class="day-fields">
            <mat-form-field appearance="outline">
              <mat-label>„A” menü</mat-label>
              <input matInput formControlName="A">
            </mat-form-field>
            <mat-form-field appearance="outline">
              <mat-label>„B” menü</mat-label>
              <input matInput formControlName="B">
            </mat-form-field>
            <mat-form-field appearance="outline">
              <mat-label>„C” menü</mat-label>
              <input matInput formControlName="C">
            </mat-form-field>
            <mat-form-field appearance="outline">
              <mat-label>Desszert</mat-label>
              <input matInput formControlName="dessert">
            </mat-form-field>
          </div>
        </div>
      </div>
    </form>
  </mat-card-content>
  <mat-card-actions align="end">
    <button mat-raised-button color="primary" (click)="save()">Mentés</button>
  </mat-card-actions>
</mat-card>
