<div class="list-header">
  <h2>Asztalfoglalások</h2>
</div>

<mat-card>
  <mat-card-content>
    <div class="table-responsive">
      <table mat-table [dataSource]="reservations" class="mat-elevation-z2">
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef> Név </th>
          <td mat-cell *matCellDef="let r"> {{r.name}} </td>
        </ng-container>
        <ng-container matColumnDef="date">
          <th mat-header-cell *matHeaderCellDef> Dátum </th>
          <td mat-cell *matCellDef="let r"> {{r.date | date:'yyyy.MM.dd'}} </td>
        </ng-container>
        <ng-container matColumnDef="time">
          <th mat-header-cell *matHeaderCellDef> Időpont </th>
          <td mat-cell *matCellDef="let r"> {{r.time}} </td>
        </ng-container>
        <ng-container matColumnDef="guests">
          <th mat-header-cell *matHeaderCellDef> Fő </th>
          <td mat-cell *matCellDef="let r"> {{r.guests}} </td>
        </ng-container>
        <ng-container matColumnDef="location">
          <th mat-header-cell *matHeaderCellDef> Helyszín </th>
          <td mat-cell *matCellDef="let r"> {{r.location === 'beltér' ? 'Beltér' : 'Kerthelyiség'}} </td>
        </ng-container>
        <ng-container matColumnDef="options">
          <th mat-header-cell *matHeaderCellDef> Extra igények </th>
          <td mat-cell *matCellDef="let r">
            <mat-chip-listbox>
              <mat-chip *ngFor="let opt of r.options">{{opt}}</mat-chip>
              <mat-chip *ngIf="r.party_color">
                <div class="deco-color-box">
                  <span>Dekor színe:</span>
                  <span>{{r.party_color}}</span>
                  <div [style.background]="r.party_color"></div>
                </div>
              </mat-chip>
            </mat-chip-listbox>
          </td>
        </ng-container>
        <ng-container matColumnDef="createdAt">
          <th mat-header-cell *matHeaderCellDef> Beküldve </th>
          <td mat-cell *matCellDef="let r"> {{r.createdAt | date:'yyyy.MM.dd HH:mm'}} </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </div>
  </mat-card-content>
</mat-card>
