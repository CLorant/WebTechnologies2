<div class="form-container">
  <mat-card class="form-card">
    <mat-card-title>Regisztráció</mat-card-title>
    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <mat-form-field appearance="outline">
        <mat-label>Név</mat-label>
        <input matInput formControlName="name">
        <mat-error *ngIf="registerForm.get('name')?.hasError('required')">Név kötelező</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Email</mat-label>
        <input matInput formControlName="email" type="email">
        <mat-error *ngIf="registerForm.get('email')?.hasError('required')">Email kötelező</mat-error>
        <mat-error *ngIf="registerForm.get('email')?.hasError('email')">Érvényes email cím szükséges</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Telefonszám</mat-label>
        <input matInput formControlName="phone">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Jelszó</mat-label>
        <input matInput formControlName="password" type="password">
        <mat-error *ngIf="registerForm.get('password')?.hasError('required')">Jelszó kötelező</mat-error>
        <mat-error *ngIf="registerForm.get('password')?.hasError('minlength')">Legalább 6 karakter</mat-error>
      </mat-form-field>

      <div class="form-actions">
        <button mat-raised-button color="primary" type="submit" [disabled]="registerForm.invalid">Regisztráció</button>
        <button mat-button type="button" routerLink="/login">Bejelentkezés</button>
      </div>
    </form>
  </mat-card>
</div>
