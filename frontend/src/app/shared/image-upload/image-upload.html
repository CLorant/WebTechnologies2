<div class="image-upload-container">
  <input type="file" (change)="onFileSelected($event)" accept="image/*" hidden #fileInput>
  <div class="upload-area" (click)="triggerFileInput(fileInput)" [class.has-image]="imagePreview || existingImageUrl">
    <div *ngIf="!imagePreview && !existingImageUrl" class="upload-placeholder">
      <mat-icon>cloud_upload</mat-icon>
      <span>Kattints ide a kép feltöltéséhez</span>
    </div>
    <div *ngIf="imagePreview || existingImageUrl" class="image-preview">
      <img [src]="imagePreview || existingImageUrl" alt="Preview">
      <div class="overlay">
        <mat-icon>edit</mat-icon>
        <span>Módosítás</span>
      </div>
    </div>
  </div>
</div>
