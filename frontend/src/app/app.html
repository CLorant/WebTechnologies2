<mat-sidenav-container *ngIf="auth.isLoggedIn(); else authLayout">
  <mat-sidenav #sidenav mode="side" opened>
    <app-sidebar></app-sidebar>
  </mat-sidenav>
  <mat-sidenav-content>
    <app-header (toggleSidenavEvent)="sidenav.toggle()"></app-header>
    <div class="content">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>

<ng-template #authLayout>
  <app-header></app-header>
  <div class="content">
    <router-outlet></router-outlet>
  </div>
</ng-template>
